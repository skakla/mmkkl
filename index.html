<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>折立</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@900&display=swap" rel="stylesheet">
    <style>
        :root {
            --v-red: #BB3E00; --v-orange: #F7AD45; --v-green: #657C6A; 
            --v-gray: #A2B9A7; --paper: #fdf6e3; --card: #ffffff; --hl: #ffee58;
        }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--v-gray); font-family: sans-serif; overflow: hidden; }
        
        .sidebar { position: fixed; top: 0; left: 0; width: 80px; height: 100vh; background: var(--v-green); z-index: 100; display: flex; flex-direction: column; align-items: center; }
        #site-logo-container { margin-top: 25px; display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .knot { width: 24px; height: 24px; background: var(--v-red); transform: rotate(45deg); border-radius: 2px; position: relative; }
        .knot::after { content: ''; position: absolute; top: 5px; left: 5px; right: 5px; bottom: 5px; border: 1px solid rgba(255,255,255,0.4); }
        .knot-line { width: 1.5px; height: 18px; background: var(--v-red); margin: -1px 0; z-index: 2; }
        .paper-tag { background: var(--paper); padding: 10px 6px; border-radius: 2px; box-shadow: 2px 2px 5px rgba(0,0,0,0.15); transform: rotate(-1.5deg); display: flex; justify-content: center; width: 32px; box-sizing: border-box; }
        .site-name-v { writing-mode: vertical-rl; color: #2c1e14; font-family: 'Noto Serif SC', serif; font-size: 18px; font-weight: 900; letter-spacing: 4px; }

        .sidebar-nav { margin-top: auto; margin-bottom: 30px; display: flex; flex-direction: column; gap: 20px; }
        .nav-item { cursor: pointer; display: flex; flex-direction: column; align-items: center; padding: 10px; }
        .nav-item div { writing-mode: vertical-rl; color: var(--paper); font-family: 'Noto Serif SC', serif; font-size: 16px; font-weight: 900; opacity: 0.8; }
        .nav-item.active div { color: var(--v-orange); opacity: 1; }

        .main-content { margin-left: 80px; flex: 1; overflow-y: auto; height: 100vh; box-sizing: border-box; }
        .header-tools { display: flex; justify-content: flex-end; align-items: center; padding: 25px 40px; max-width: 1100px; margin: 0 auto; }

        /* Search Section */
        .search-container { display: flex; align-items: center; gap: 0; position: relative; }
        .search-box { width: 0; overflow: hidden; opacity: 0; transition: 0.3s ease; }
        .search-box.open { width: 180px; opacity: 1; margin-right: 10px; } /* 缩短宽度 */
        .search-box input { width: 100%; padding: 8px 12px; background: #fff; border: 1.5px solid var(--v-red); border-radius: 4px; outline: none; font-size: 13px; }

        /* 沉底动效容器 */
        .search-trigger {
            width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
            border-radius: 6px; cursor: pointer; transition: all 0.1s;
        }
        /* 点击时的暗黑凹陷感 */
        .search-trigger:active {
            background: rgba(0,0,0,0.1);
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.2);
            transform: translateY(1px);
        }

        .icon-search-v { width: 20px; height: 20px; position: relative; pointer-events: none; }
        .icon-search-v .c { width: 14px; height: 14px; border: 2px solid var(--v-red); border-radius: 50%; position: absolute; top: 0; left: 0; }
        .icon-search-v .l { width: 2px; height: 8px; background: var(--v-red); position: absolute; bottom: -1px; right: -1px; transform: rotate(-45deg); }

        /* Grid */
        #view-container { padding: 0 40px 40px 40px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; max-width: 1100px; margin: 0 auto; }
        .card { background: var(--card); border-radius: 12px; padding: 25px; border-left: 6px solid var(--v-orange); cursor: pointer; transition: 0.3s; }
        .card:hover { transform: translateY(-3px); }
        .card-h { font-family: 'Noto Serif SC', serif; font-size: 1.5em; color: var(--v-green); margin-bottom: 15px; }
        .card-list { list-style: none; padding: 0; margin: 0; font-size: 13px; color: #666; }
        .card-list li { margin-bottom: 8px; border-bottom: 1px solid #f0f0f0; padding-bottom: 5px; overflow: hidden; text-overflow: ellipsis; }
        .card-preview { color: #555; line-height: 1.7; font-size: 14px; display: -webkit-box; -webkit-line-clamp: 5; -webkit-box-orient: vertical; overflow: hidden; }
        .hl { background: var(--hl); color: #000; font-weight: bold; }

        /* Article */
        .article { max-width: 850px; margin: 0 auto; background: #fff; padding: 45px; border-radius: 12px; }
        .article h1 { font-family: 'Noto Serif SC', serif; color: var(--v-green); border-bottom: 1px solid #eee; padding-bottom: 20px; margin-bottom: 25px; }
        .article-body { color: #333; line-height: 2; font-size: 17px; white-space: pre-wrap; }

        .loading { display: flex; justify-content: center; align-items: center; height: 50vh; }
        .spinner { width: 30px; height: 30px; border: 3px solid #eee; border-top: 3px solid var(--v-red); border-radius: 50%; animation: s 1s linear infinite; }
        @keyframes s { 100% { transform: rotate(360deg); } }
        .res-info { color: white; margin: 0 auto 25px; max-width: 1100px; font-size: 14px; opacity: 0.8; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div id="site-logo-container" onclick="showHome()">
            <div class="knot"></div><div class="knot-line"></div>
            <div class="paper-tag"><div class="site-name-v">折立</div></div>
        </div>
        <div class="sidebar-nav">
            <div class="nav-item active" id="nav-cat" onclick="showHome()"><div>分类</div></div>
            <div class="nav-item" id="nav-recent" onclick="showRecent()"><div>最新</div></div>
        </div>
    </div>
    <div class="main-content">
        <div class="header-tools">
            <div class="search-container">
                <div class="search-box" id="sb">
                    <input type="text" id="sk" placeholder="搜索..." onkeypress="if(event.key==='Enter')exeSearch()">
                </div>
                <div class="search-trigger" onclick="toggleS()">
                    <div class="icon-search-v">
                        <div class="c"></div><div class="l"></div>
                    </div>
                </div>
            </div>
        </div>
        <div id="view-container"></div>
    </div>
    <script>
        const repo = 'skakla/mmkkl';
        let data = [];
        async function init() {
            const v = document.getElementById('view-container');
            v.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
            try {
                const r = await fetch(`https://api.github.com/repos/${repo}/issues?per_page=100&t=${Date.now()}`);
                data = await r.json();
                showHome();
            } catch (e) { v.innerHTML = 'Error'; }
        }
        function setNav(id) {
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            if(id) document.getElementById(id).classList.add('active');
        }
        function toggleS() {
            const b = document.getElementById('sb');
            const k = document.getElementById('sk');
            if(k.value.trim() && b.classList.contains('open')) { exeSearch(); return; }
            if(!b.classList.contains('open')) { b.classList.add('open'); k.focus(); }
            else { b.classList.remove('open'); }
        }
        function exeSearch() {
            const k = document.getElementById('sk').value.trim();
            if(!k) return;
            setNav(null);
            const v = document.getElementById('view-container');
            const reg = new RegExp(`(${k})`, 'gi');
            const res = data.filter(i => (i.title + i.body).match(reg));
            let h = `<div class="res-info">找到 ${res.length} 条结果</div><div class="grid">`;
            res.forEach(i => {
                h += `<div class="card" onclick="showA(${i.number},'${k}')"><div class="card-h">${i.title.replace(reg, '<span class="hl">$1</span>')}</div><div class="card-preview">${getP(i.body || '', k, reg)}</div></div>`;
            });
            v.innerHTML = h + '</div>';
            document.getElementById('sb').classList.remove('open');
        }
        function getP(c, k, r) {
            const idx = c.toLowerCase().indexOf(k.toLowerCase());
            if(idx === -1) return c.substring(0, 150).replace(r, '<span class="hl">$1</span>');
            const s = Math.max(0, idx - 40), e = Math.min(c.length, idx + 120);
            return (s > 0 ? '...' : '') + c.substring(s, e).replace(r, '<span class="hl">$1</span>') + (e < c.length ? '...' : '');
        }
        function showHome() {
            setNav('nav-cat');
            const v = document.getElementById('view-container');
            const m = {};
            data.forEach(i => i.labels.forEach(l => {
                if(!m[l.name]) m[l.name] = [];
                if(m[l.name].length < 5) m[l.name].push(i.title);
            }));
            let h = '<div class="grid">';
            for(const [n, ts] of Object.entries(m)) {
                h += `<div class="card" onclick="showC('${n}')"><div class="card-h"># ${n}</div><ul class="card-list">${ts.map(t=>`<li>${t}</li>`).join('')}</ul></div>`;
            }
            v.innerHTML = h + '</div>';
        }
        function showRecent() {
            setNav('nav-recent');
            const v = document.getElementById('view-container');
            let h = '<div class="grid">';
            data.forEach(i => {
                h += `<div class="card" onclick="showA(${i.number})"><div class="card-h">${i.title}</div><div class="card-preview">${(i.body || '').substring(0, 120)}...</div></div>`;
            });
            v.innerHTML = h + '</div>';
        }
        function showC(ln) {
            setNav(null);
            const v = document.getElementById('view-container');
            const f = data.filter(i => i.labels.some(l => l.name === ln));
            let h = `<div class="res-info">分类：${ln}</div><div class="grid">`;
            f.forEach(i => {
                h += `<div class="card" onclick="showA(${i.number})"><div class="card-h">${i.title}</div><div class="card-preview">${(i.body || '').substring(0, 120)}...</div></div>`;
            });
            v.innerHTML = h + '</div>';
        }
        function showA(n, k = null) {
            setNav(null);
            const v = document.getElementById('view-container');
            const i = data.find(x => x.number === n);
            let b = i.body || '';
            if(k) b = b.replace(new RegExp(`(${k})`, 'gi'), '<span class="hl">$1</span>');
            v.innerHTML = `<div class="article"><h1>${i.title}</h1><div class="article-body">${b}</div></div>`;
            v.scrollTo(0,0);
        }
        init();
    </script>
</body>
</html>
