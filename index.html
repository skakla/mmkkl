<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>折立</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --v-red: #BB3E00; --v-orange: #F7AD45; --v-green: #657C6A; 
            --v-gray: #A2B9A7; --paper: #fdf6e3; --card: #ffffff; --hl: #ffee58;
        }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--v-gray); font-family: sans-serif; overflow-x: hidden; }
        
        .sidebar { position: fixed; top: 0; left: 0; width: 80px; height: 100vh; background: var(--v-green); z-index: 1000; display: flex; flex-direction: column; align-items: center; }
        #site-logo-container { margin-top: 25px; display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .knot { width: 22px; height: 22px; background: var(--v-red); transform: rotate(45deg); border-radius: 2px; position: relative; }
        .knot::after { content: ''; position: absolute; top: 4px; left: 4px; right: 4px; bottom: 4px; border: 1px solid rgba(255,255,255,0.4); }
        .knot-line { width: 1.5px; height: 18px; background: var(--v-red); margin: -1px 0; z-index: 2; }
        .paper-tag { background: var(--paper); padding: 10px 6px; border-radius: 2px; box-shadow: 2px 2px 5px rgba(0,0,0,0.15); transform: rotate(-1.5deg); display: flex; justify-content: center; width: 32px; box-sizing: border-box; }
        .site-name-v { writing-mode: vertical-rl; color: #2c1e14; font-family: 'Noto Serif SC', serif; font-size: 18px; font-weight: 900; letter-spacing: 4px; }

        .sidebar-nav { margin-top: auto; margin-bottom: 35px; display: flex; flex-direction: column; gap: 20px; align-items: center; }
        .nav-item { cursor: pointer; opacity: 0.6; transition: 0.2s; padding: 5px; }
        .nav-item div { color: var(--paper); font-family: 'Noto Serif SC', serif; font-size: 15px; font-weight: 900; }
        .nav-item.active { opacity: 1; }
        .nav-item.active div { color: var(--v-orange); }

        .main-content { margin-left: 80px; min-height: 100vh; }
        .header-tools { display: flex; justify-content: flex-end; align-items: center; padding: 25px 30px; max-width: 1100px; margin: 0 auto; height: 50px; position: relative; }

        .search-container { 
            display: flex; align-items: center; background: #fff; 
            border: 2px solid var(--v-red); border-radius: 8px; 
            padding: 3px; visibility: hidden; opacity: 0; 
            transition: 0.3s; position: absolute; right: 85px; width: 200px; z-index: 10;
        }
        .search-container.show { visibility: visible; opacity: 1; }
        .search-container input { border: none; outline: none; padding: 6px; flex: 1; font-size: 14px; min-width: 0; }
        .search-btn { background: var(--v-red); color: white; border: none; padding: 6px 12px; border-radius: 5px; cursor: pointer; font-size: 13px; font-weight: bold; }

        .search-trigger { width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; border-radius: 50%; cursor: pointer; }
        .icon-search-v { width: 18px; height: 18px; position: relative; }
        .icon-search-v .c { width: 12px; height: 12px; border: 2.5px solid var(--v-red); border-radius: 50%; position: absolute; top: 0; left: 0; }
        .icon-search-v .l { width: 3px; height: 7px; background: var(--v-red); position: absolute; bottom: -1px; right: -1px; transform: rotate(-45deg); }

        #view-container { padding: 0 40px 40px 40px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; max-width: 1100px; margin: 0 auto; }
        .card { background: var(--card); border-radius: 12px; padding: 25px; border-left: 6px solid var(--v-orange); cursor: pointer; transition: 0.2s; display: flex; flex-direction: column; }
        .card:hover { transform: translateY(-4px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .card-h { font-family: 'Noto Serif SC', serif; font-size: 1.3em; color: var(--v-green); margin-bottom: 12px; font-weight: 700; }
        
        .card-list { list-style: none; padding: 0; margin: 0; border-top: 1px solid #f0f0f0; padding-top: 10px; }
        .card-list li { font-size: 13px; color: #777; padding: 4px 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .card-list li::before { content: "• "; color: var(--v-orange); }

        /* 搜索结果摘要样式 */
        .search-snippet { 
            font-size: 13px; color: #666; line-height: 1.5; margin-top: 10px; 
            display: -webkit-box; -webkit-line-clamp: 5; -webkit-box-orient: vertical; 
            overflow: hidden; border-top: 1px solid #f0f0f0; padding-top: 10px;
        }

        .article { max-width: 800px; margin: 0 auto; background: #fff; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .hl { background: var(--hl); font-weight: bold; border-radius: 2px; padding: 0 2px; }
        .loading { display: flex; justify-content: center; padding-top: 150px; }
        .spinner { width: 32px; height: 32px; border: 4px solid rgba(255,255,255,0.2); border-top: 4px solid var(--v-red); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="sidebar">
        <div id="site-logo-container" onclick="showNavMode()">
            <div class="knot"></div><div class="knot-line"></div>
            <div class="paper-tag"><div class="site-name-v">折立</div></div>
        </div>
        <div class="sidebar-nav">
            <div class="nav-item" id="nav-cat" onclick="showCategories()"><div>分类</div></div>
            <div class="nav-item" id="nav-recent" onclick="showRecent()"><div>最新</div></div>
        </div>
    </div>
    <div class="main-content">
        <div class="header-tools">
            <div class="search-container" id="sc">
                <input type="text" id="sk" placeholder="搜索内容..." onkeypress="if(event.key==='Enter')exeSearch()">
                <button class="search-btn" onclick="exeSearch()">搜索</button>
            </div>
            <div class="search-trigger" onclick="toggleS()">
                <div class="icon-search-v"><div class="c"></div><div class="l"></div></div>
            </div>
        </div>
        <div id="view-container"></div>
    </div>

    <script>
        const repo = 'skakla/mmkkl';
        let data = [];

        async function init() {
            const v = document.getElementById('view-container');
            v.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
            try {
                const r = await fetch(`https://api.github.com/repos/${repo}/issues?per_page=100&t=${Date.now()}`);
                data = await r.json();
                showNavMode();
            } catch (e) { v.innerHTML = '<div style="text-align:center;color:white;margin-top:50px;">加载失败，请刷新重试</div>'; }
        }

        // 首页模式：包含预览扩展
        function showNavMode() {
            setNav(null);
            const v = document.getElementById('view-container');
            
            // 获取前5个标签预览
            const labels = [...new Set(data.flatMap(i => i.labels.map(l => l.name)))].slice(0, 5);
            // 获取前5篇文章标题
            const recents = data.slice(0, 5).map(i => i.title);

            v.innerHTML = `
                <div class="grid">
                    <div class="card" onclick="showCategories()">
                        <div class="card-h">分类</div>
                        <ul class="card-list">
                            ${labels.map(l => `<li>${l}</li>`).join('')}
                        </ul>
                    </div>
                    <div class="card" onclick="showRecent()">
                        <div class="card-h">最新</div>
                        <ul class="card-list">
                            ${recents.map(t => `<li>${t}</li>`).join('')}
                        </ul>
                    </div>
                </div>`;
        }

        function showCategories() {
            setNav('nav-cat');
            const v = document.getElementById('view-container');
            const m = {};
            data.forEach(i => i.labels.forEach(l => {
                if(!m[l.name]) m[l.name] = [];
                if(m[l.name].length < 5) m[l.name].push(i.title);
            }));
            let h = '<div class="grid">';
            for(const name in m) {
                h += `<div class="card" onclick="showLabelPosts('${name}')">
                        <div class="card-h"># ${name}</div>
                        <ul class="card-list">${m[name].map(t => `<li>${t}</li>`).join('')}</ul>
                      </div>`;
            }
            v.innerHTML = h + '</div>';
        }

        function showLabelPosts(ln) {
            setNav(null);
            const v = document.getElementById('view-container');
            const f = data.filter(i => i.labels.some(l => l.name === ln));
            let h = `<div style="margin-bottom:20px; font-weight:bold; color:white; font-size:1.2em;"># ${ln}</div><div class="grid">`;
            f.forEach(i => h += `<div class="card" onclick="showA(${i.number})"><div class="card-h">${i.title}</div></div>`);
            v.innerHTML = h + '</div>';
        }

        function showRecent() {
            setNav('nav-recent');
            const v = document.getElementById('view-container');
            let h = '<div class="grid">';
            data.forEach(i => h += `<div class="card" onclick="showA(${i.number})"><div class="card-h">${i.title}</div></div>`);
            v.innerHTML = h + '</div>';
        }

        function toggleS() {
            const c = document.getElementById('sc');
            c.classList.toggle('show');
            if(c.classList.contains('show')) document.getElementById('sk').focus();
        }

        // 搜索功能增强：标题高亮 + 5行正文片段高亮
        function exeSearch() {
            const k = document.getElementById('sk').value.trim();
            if(!k) return;
            setNav(null);
            const v = document.getElementById('view-container');
            const reg = new RegExp(`(${k})`, 'gi');
            const res = data.filter(i => (i.title + (i.body||'')).match(reg));
            
            let h = `<div style="margin-bottom:20px; color:white;">找到 ${res.length} 篇相关文章</div><div class="grid">`;
            
            res.forEach(i => {
                const titleHl = i.title.replace(reg, '<span class="hl">$1</span>');
                // 提取正文片段：找到关键词位置，前后截取，限制在5行左右
                let bodyPlain = (i.body || "").replace(/[#*`]/g, ''); // 简单过滤Markdown符号
                let snippet = "";
                const idx = bodyPlain.toLowerCase().indexOf(k.toLowerCase());
                
                if(idx > -1) {
                    const start = Math.max(0, idx - 40);
                    const end = Math.min(bodyPlain.length, idx + 120);
                    snippet = (start > 0 ? "..." : "") + bodyPlain.substring(start, end) + "...";
                    snippet = snippet.replace(reg, '<span class="hl">$1</span>');
                } else {
                    snippet = bodyPlain.substring(0, 100) + "...";
                }

                h += `<div class="card" onclick="showA(${i.number},'${k}')">
                        <div class="card-h">${titleHl}</div>
                        <div class="search-snippet">${snippet}</div>
                      </div>`;
            });
            
            v.innerHTML = h + '</div>';
            document.getElementById('sc').classList.remove('show');
        }

        function showA(n, k = null) {
            setNav(null);
            const v = document.getElementById('view-container');
            const i = data.find(x => x.number === n);
            let b = i.body || '';
            if(k) b = b.replace(new RegExp(`(${k})`, 'gi'), '<span class="hl">$1</span>');
            v.innerHTML = `<div class="article"><h1 style="font-family:'Noto Serif SC'; color:var(--v-red); margin-top:0;">${i.title}</h1><div style="line-height:1.9; white-space:pre-wrap; color:#333;">${b}</div></div>`;
            window.scrollTo(0,0);
        }

        function setNav(id) {
            document.querySelectorAll('.nav-item').forEach(n => {
                if(n.id === id) {
                    n.classList.add('active');
                } else {
                    n.classList.remove('active');
                }
            });
        }

        init();
    </script>
</body>
</html>
