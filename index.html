<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>折立</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@700&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background-color: #f4f1ea; font-family: "PingFang SC", "Microsoft YaHei", sans-serif; display: flex; overflow: hidden; }
        
        /* 1. 侧边栏样式 */
        .sidebar { 
            position: fixed; top: 0; left: 0; width: 80px; height: 100vh; 
            background-color: #7a5230; z-index: 100; 
            display: flex; flex-direction: column; align-items: center; 
            box-shadow: 2px 0 10px rgba(0,0,0,0.1); 
        }

        .site-name-vertical { 
            writing-mode: vertical-rl; color: #f4f1ea; 
            font-family: 'Noto Serif SC', serif; font-size: 26px; font-weight: 700; 
            letter-spacing: 10px; margin: 40px 0; cursor: pointer; 
        }

        /* 标签改为横向显示 */
        .nav-label { 
            color: rgba(244, 241, 234, 0.6); font-size: 15px; margin: 15px 0; 
            cursor: pointer; transition: 0.2s; position: relative; 
            padding: 5px 0; width: 60px; text-align: center;
        }

        /* 选中状态：不跳动 */
        .nav-label.active { color: #fff; text-shadow: 0 0 1px #fff; }
        .nav-label.active::after { 
            content: ''; position: absolute; bottom: -2px; left: 20%; 
            width: 60%; height: 2px; background-color: #fff; border-radius: 2px; 
        }

        /* 2. 内容区样式 */
        .main-content { margin-left: 80px; flex: 1; padding: 40px; overflow-y: auto; height: 100vh; box-sizing: border-box; }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card { 
            background: #fff; border-radius: 8px; padding: 30px; margin-bottom: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-left: 5px solid #7a5230;
            position: relative; animation: fadeInUp 0.5s ease backwards;
        }
        
        .card h3 { 
            margin-top: 0; color: #7a5230; font-size: 1.5em; 
            font-family: 'Noto Serif SC', serif; border-bottom: 1px solid #f0f0f0; 
            padding-bottom: 12px; margin-bottom: 18px; 
        }
        .card-body { color: #444; line-height: 1.8; white-space: pre-wrap; padding-bottom: 40px; font-size: 1.05em; }

        .card-footer-tags { position: absolute; right: 20px; bottom: 15px; display: flex; gap: 8px; }
        .inner-tag { padding: 2px 10px; border-radius: 4px; font-size: 11px; color: #fff; font-weight: bold; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="site-name-vertical" onclick="filterNotes('all', this)">折立</div>
        <div id="label-list"></div>
    </div>
    <div class="main-content">
        <div id="feed">正在载入...</div>
    </div>

    <script>
        let allIssues = [];
        // 请确保这里的仓库名是正确的
        const repoPath = 'skakla/mmkkl';

        fetch(`https://api.github.com/repos/${repoPath}/issues?per_page=100`)
            .then(res => res.json())
            .then(data => {
                allIssues = data;
                renderLabels(data);
                renderNotes(data);
            })
            .catch(err => {
                document.getElementById('feed').innerHTML = '<p>数据同步失败，请刷新。</p>';
            });

        function renderLabels(data) {
            const labelList = document.getElementById('label-list');
            labelList.innerHTML = '';
            let labels = new Set();
            data.forEach(item => item.labels.forEach(l => labels.add(l.name)));
            labels.forEach(name => {
                const el = document.createElement('div');
                el.className = 'nav-label';
                el.innerText = name;
                el.onclick = function() { filterNotes(name, this); };
                labelList.appendChild(el);
            });
        }

        function renderNotes(data) {
            const feed = document.getElementById('feed');
            feed.innerHTML = '';
            data.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.style.animationDelay = (index * 0.1) + 's';
                let tagsHtml = item.labels.map(l => 
                    `<span class="inner-tag" style="background:#${l.color}">${l.name}</span>`
                ).join('');
                card.innerHTML = `
                    <h3>${item.title}</h3>
                    <div class="card-body">${item.body}</div>
                    <div class="card-footer-tags">${tagsHtml || '<span class="inner-tag" style="background:#bbb">未分类</span>'}</div>
                `;
                feed.appendChild(card);
            });
        }

        function filterNotes(labelName, element) {
            document.querySelectorAll('.nav-label, .site-name-vertical').forEach(el => el.classList.remove('active'));
            if(element) element.classList.add('active');
            const filtered = labelName === 'all' ? allIssues : allIssues.filter(item => item.labels.some(l => l.name === labelName));
            renderNotes(filtered);
        }
    </script>
</body>
</html>
