<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>折立</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --v-red: #BB3E00; --v-orange: #F7AD45; --v-green: #657C6A; 
            --v-gray: #A2B9A7; --paper: #fdf6e3; --card: #ffffff; --hl: #ffee58;
            --text-main: #2c1e14; --text-sub: #444444;
            --side-w: 80px;
        }
        /* 彻底修复缺口：确保 html/body 撑满且无间隙 */
        body, html { margin: 0; padding: 0; background: var(--v-gray); font-family: sans-serif; height: 100%; width: 100%; }
        
        /* 侧边栏：使用 fixed + 100% 高度确保没有底部漏白 */
        .sidebar { position: fixed; top: 0; left: 0; width: var(--side-w); height: 100%; background: var(--v-green); z-index: 1000; display: flex; flex-direction: column; align-items: center; border: none; }
        
        #site-logo-container { margin-top: 25px; display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .knot { 
            width: 22px; height: 22px; background: var(--v-red); transform: rotate(45deg); 
            border-radius: 2px; position: relative;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.3), inset 1px 1px 0 rgba(255,255,255,0.4);
        }
        .knot::after {
            content: ''; position: absolute; top: 5px; left: 5px; right: 5px; bottom: 5px;
            border: 1px solid rgba(255,255,255,0.3); border-radius: 1px;
        }
        .knot-line { width: 2px; height: 18px; background: var(--v-red); margin: -1px 0; z-index: 2; }
        .paper-tag { background: var(--paper); padding: 10px 6px; border-radius: 2px; box-shadow: 3px 3px 8px rgba(0,0,0,0.2); transform: rotate(-1.5deg); display: flex; justify-content: center; width: 34px; box-sizing: border-box; }
        .site-name-v { writing-mode: vertical-rl; color: var(--text-main); font-family: 'Noto Serif SC', serif; font-size: 18px; font-weight: 900; letter-spacing: 4px; }

        .sidebar-nav { margin-top: auto; margin-bottom: 35px; display: flex; flex-direction: column; gap: 20px; align-items: center; }
        .nav-item { cursor: pointer; opacity: 0.7; transition: 0.3s; }
        .nav-item div { color: var(--paper); font-family: 'Noto Serif SC', serif; font-size: 15px; font-weight: 900; }
        .nav-item.active div { color: var(--v-orange); }

        .main-content { margin-left: var(--side-w); min-height: 100vh; padding: 0 40px 40px 40px; box-sizing: border-box; }
        .header-tools { display: flex; justify-content: flex-end; align-items: center; padding: 25px 0; max-width: 1100px; margin: 0 auto; height: 50px; position: relative; }

        /* 搜索功能样式 */
        .search-container { display: none; align-items: center; background: white; border: 2px solid var(--v-red); border-radius: 10px; padding: 4px; position: absolute; right: 50px; width: 220px; z-index: 2000; }
        .search-container.show { display: flex; }
        .search-container input { border: none; outline: none; padding: 8px; flex: 1; font-size: 14px; }
        .search-btn { background: var(--v-red); color: white; border: none; height: 32px; width: 56px; display: flex; align-items: center; justify-content: center; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: bold; }
        .search-trigger { width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .icon-search-v { width: 18px; height: 18px; position: relative; border: 2.5px solid var(--v-red); border-radius: 50%; box-sizing: border-box; }
        .icon-search-v::after { content: ''; position: absolute; width: 3px; height: 8px; background: var(--v-red); bottom: -5px; right: -3px; transform: rotate(-45deg); }

        /* 首页布局 */
        .home-layout { display: flex; gap: 30px; max-width: 1100px; margin: 20px auto; align-items: flex-start; }
        .left-column { width: 280px; display: flex; flex-direction: column; gap: 20px; flex-shrink: 0; }
        .right-column { flex-grow: 1; }

        .card { background: var(--card); border-radius: 15px; padding: 25px; border-left: 6px solid var(--v-orange); cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .card-h { font-family: 'Noto Serif SC', serif; font-size: 1.3em; color: var(--v-green); font-weight: 900; margin-bottom: 12px; }
        .card-list { list-style: none; padding: 0; margin: 0; }
        .card-list li { font-size: 14px; color: var(--text-sub); padding: 5px 0; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* 右侧随机箱 */
        .random-box { background: var(--paper); border-radius: 15px; padding: 40px; border: 1px solid rgba(0,0,0,0.05); position: relative; min-height: 350px; box-shadow: inset 0 0 40px rgba(0,0,0,0.05); }
        .random-tag-label { position: absolute; top: 20px; right: 25px; font-size: 12px; color: var(--v-red); font-weight: bold; background: rgba(187, 62, 0, 0.1); padding: 4px 12px; border-radius: 20px; }
        .random-title { font-family: 'Noto Serif SC', serif; font-size: 2.2em; color: var(--text-main); margin-bottom: 20px; font-weight: 900; line-height: 1.3; }
        .random-snippet { font-size: 17px; line-height: 1.8; color: var(--text-sub); margin-bottom: 30px; display: -webkit-box; -webkit-line-clamp: 6; -webkit-box-orient: vertical; overflow: hidden; }
        .read-more-btn { display: inline-block; background: var(--v-red); color: white; padding: 12px 30px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* 文件下载按钮样式 (文章内自动识别) */
        .file-download-link {
            display: inline-flex; align-items: center; gap: 10px;
            background: #f0f0f0; border: 2px solid var(--v-green);
            padding: 10px 18px; border-radius: 10px;
            color: var(--v-green); text-decoration: none;
            font-weight: bold; margin: 10px 0; transition: 0.2s;
        }
        .file-download-link:hover { background: var(--v-green); color: white; }
        .file-download-link::before { content: '📁'; font-size: 1.2em; }

        .article { max-width: 800px; margin: 0 auto; background: #fff; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .article h1 { font-family: 'Noto Serif SC'; color: var(--v-red); font-size: 2.2em; margin-bottom: 30px; }
        .post-body { line-height: 2; color: var(--text-main); font-size: 18px; white-space: pre-wrap; }
        .post-body img { max-width: 100%; border-radius: 10px; margin: 20px 0; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; max-width: 1100px; margin: 0 auto; }
        .hl { background: var(--hl); padding: 0 2px; border-radius: 2px; font-weight: bold; }

        @media (max-width: 850px) {
            .sidebar { width: 100%; height: 60px; top: auto; bottom: 0; flex-direction: row; padding: 0 20px; box-sizing: border-box; }
            .main-content { margin-left: 0; padding-bottom: 80px; }
            .home-layout { flex-direction: column; }
            .left-column { width: 100%; }
            .knot-line { display: none; }
            .site-name-v { writing-mode: horizontal-tb; font-size: 16px; }
            .sidebar-nav { margin: 0 0 0 auto; flex-direction: row; gap: 20px; margin-bottom: 0; }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div id="site-logo-container" onclick="renderHome()">
            <div class="knot"></div><div class="knot-line"></div>
            <div class="paper-tag"><div class="site-name-v">折立</div></div>
        </div>
        <div class="sidebar-nav">
            <div class="nav-item" id="nav-cat" onclick="renderCategories()"><div>分类</div></div>
            <div class="nav-item" id="nav-recent" onclick="renderRecent()"><div>最新</div></div>
        </div>
    </div>

    <div class="main-content">
        <div class="header-tools">
            <div class="search-container" id="sc">
                <input type="text" id="sk" placeholder="搜索关键词..." onkeypress="if(event.key==='Enter')exeSearch()">
                <button class="search-btn" onclick="exeSearch()">搜索</button>
            </div>
            <div class="search-trigger" onclick="toggleS()">
                <div class="icon-search-v"></div>
            </div>
        </div>
        <div id="view-container"></div>
    </div>

    <script>
        const repo = 'skakla/mmkkl';
        let data = JSON.parse(localStorage.getItem('blog_cache') || '[]');
        const view = document.getElementById('view-container');

        async function init() {
            if(data.length > 0) renderHome();
            try {
                const r = await fetch(`https://api.github.com/repos/${repo}/issues?per_page=100&t=${Date.now()}`);
                if (r.ok) {
                    data = await r.json();
                    localStorage.setItem('blog_cache', JSON.stringify(data));
                    renderHome();
                }
            } catch (e) { console.error(e); }
        }

        function toggleS() {
            const sc = document.getElementById('sc');
            sc.classList.toggle('show');
            if(sc.classList.contains('show')) document.getElementById('sk').focus();
        }

        function exeSearch() {
            const k = document.getElementById('sk').value.trim();
            if(!k) return;
            const reg = new RegExp(`(${k.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
            const res = data.filter(i => (i.title + (i.body||'')).match(reg));
            let h = `<div style="margin: 0 auto 20px auto; max-width:1100px; font-weight:900; color:white;">关于 “${k}” 的搜索结果 (${res.length})</div><div class="grid">`;
            res.forEach(i => {
                h += `<div class="card" onclick="renderArticle(${i.number},'${k}')"><div class="card-h">${i.title.replace(reg, '<span class="hl">$1</span>')}</div></div>`;
            });
            updateUI(h + '</div>');
            document.getElementById('sc').classList.remove('show');
        }

        function renderHome() {
            if(!data.length) return;
            const pool = data.filter(p => p.labels.some(l => l.name === '存疑之论' || l.name === '转载文章'));
            const displayPool = pool.length > 0 ? pool : data;
            
            const NOW = Date.now();
            const TWELVE_HOURS = 12 * 60 * 60 * 1000;
            let cache = JSON.parse(localStorage.getItem('home_random_post') || '{}');
            let randomPost;

            if (!cache.postId || !cache.time || (NOW - cache.time > TWELVE_HOURS)) {
                randomPost = displayPool[Math.floor(Math.random() * displayPool.length)];
                localStorage.setItem('home_random_post', JSON.stringify({ postId: randomPost.number, time: NOW }));
            } else {
                randomPost = data.find(p => p.number === cache.postId) || displayPool[0];
            }

            const activeTag = randomPost.labels.find(l => l.name === '存疑之论' || l.name === '转载文章')?.name || "精选";
            const snippet = (randomPost.body || "").replace(/!\[.*?\]\(.*?\)/g, "").substring(0, 250) + "...";
            const labels = [...new Set(data.flatMap(i => i.labels.map(l => l.name)))].slice(0, 5);
            const recents = data.slice(0, 5).map(i => i.title);

            let h = `<div class="home-layout">
                <div class="left-column">
                    <div class="card" onclick="renderCategories()"><div class="card-h">分类</div><ul class="card-list">${labels.map(l => `<li># ${l}</li>`).join('')}</ul></div>
                    <div class="card" onclick="renderRecent()"><div class="card-h">最新</div><ul class="card-list">${recents.map(t => `<li>${t}</li>`).join('')}</ul></div>
                </div>
                <div class="right-column">
                    <div class="random-box">
                        <div class="random-tag-label">${activeTag}</div>
                        <div class="random-title">${randomPost.title}</div>
                        <div class="random-snippet">${snippet}</div>
                        <div class="read-more-btn" onclick="renderArticle(${randomPost.number})">阅读原文</div>
                    </div>
                </div>
            </div>`;
            updateUI(h);
        }

        function renderArticle(n, k = null) {
            const i = data.find(x => x.number === n);
            if(!i) return;
            let b = i.body || '';

            // 连锁反应处理：1. 图片转化
            b = b.replace(/!\[.*?\]\((.*?)\)/g, '<img src="$1">');

            // 连锁反应处理：2. 自动识别文件链接并转化为下载按钮
            // 匹配格式: [文件名](url) 且 url 以常见文件后缀结尾
            b = b.replace(/\[(.*?)\]\((.*?\.(?:pdf|zip|rar|7z|docx|xlsx|pptx|exe|apk|txt|csv))\)/gi, 
                '<a href="$2" download="$1" class="file-download-link">$1</a>');

            // 3. 搜索高亮
            if(k) {
                const safeK = k.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                b = b.replace(new RegExp(`(${safeK})`, 'gi'), '<span class="hl">$1</span>');
            }
            updateUI(`<div class="article"><h1>${i.title}</h1><div class="post-body">${b}</div></div>`);
        }

        function renderCategories() {
            const m = {};
            data.forEach(i => i.labels.forEach(l => {
                if(!m[l.name]) m[l.name] = [];
                if(m[l.name].length < 5) m[l.name].push(i.title);
            }));
            let h = '<div class="grid">';
            for(const name in m) {
                h += `<div class="card" onclick="renderLabelPosts('${name}')"><div class="card-h"># ${name}</div><ul class="card-list">${m[name].map(t => `<li>${t}</li>`).join('')}</ul></div>`;
            }
            updateUI(h + '</div>', 'nav-cat');
        }

        function renderRecent() {
            let h = '<div class="grid">';
            data.forEach(i => h += `<div class="card" onclick="renderArticle(${i.number})"><div class="card-h">${i.title}</div></div>`);
            updateUI(h + '</div>', 'nav-recent');
        }

        function renderLabelPosts(ln) {
            const f = data.filter(i => i.labels.some(l => l.name === ln));
            let h = `<div style="margin: 0 auto 20px auto; max-width:1100px; font-weight:900; color:white;"># ${ln}</div><div class="grid">`;
            f.forEach(i => h += `<div class="card" onclick="renderArticle(${i.number})"><div class="card-h">${i.title}</div></div>`);
            updateUI(h + '</div>');
        }

        function updateUI(html, navId = null) {
            view.innerHTML = html;
            document.querySelectorAll('.nav-item').forEach(n => n.classList.toggle('active', n.id === navId));
            window.scrollTo(0,0);
        }

        init();
    </script>
</body>
</html>
