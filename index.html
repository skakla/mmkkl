<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>折立</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@900&display=swap" rel="stylesheet">
    <style>
        :root {
            --v-red: #BB3E00; --v-orange: #F7AD45; --v-green: #657C6A; 
            --v-gray: #A2B9A7; --paper: #fdf6e3; --card: #ffffff; --hl: #ffee58;
        }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--v-gray); font-family: sans-serif; overflow-x: hidden; }
        
        /* Sidebar */
        .sidebar { position: fixed; top: 0; left: 0; width: 80px; height: 100vh; background: var(--v-green); z-index: 100; display: flex; flex-direction: column; align-items: center; }
        #site-logo-container { margin-top: 25px; display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .knot { width: 24px; height: 24px; background: var(--v-red); transform: rotate(45deg); border-radius: 2px; position: relative; }
        .knot::after { content: ''; position: absolute; top: 5px; left: 5px; right: 5px; bottom: 5px; border: 1px solid rgba(255,255,255,0.4); }
        .knot-line { width: 1.5px; height: 18px; background: var(--v-red); margin: -1px 0; z-index: 2; }
        .paper-tag { background: var(--paper); padding: 10px 6px; border-radius: 2px; box-shadow: 2px 2px 5px rgba(0,0,0,0.15); transform: rotate(-1.5deg); display: flex; justify-content: center; width: 32px; box-sizing: border-box; }
        .site-name-v { writing-mode: vertical-rl; color: #2c1e14; font-family: 'Noto Serif SC', serif; font-size: 18px; font-weight: 900; letter-spacing: 4px; }

        .sidebar-nav { margin-top: auto; margin-bottom: 30px; display: flex; flex-direction: column; gap: 20px; }
        .nav-item { cursor: pointer; opacity: 0.6; transition: 0.3s; }
        .nav-item div { writing-mode: vertical-rl; color: var(--paper); font-family: 'Noto Serif SC', serif; font-size: 16px; font-weight: 900; }
        .nav-item.active { opacity: 1; }
        .nav-item.active div { color: var(--v-orange); }

        /* Main */
        .main-content { margin-left: 80px; min-height: 100vh; box-sizing: border-box; }
        .header-tools { display: flex; justify-content: flex-end; align-items: center; padding: 25px 40px; max-width: 1100px; margin: 0 auto; height: 40px; }

        /* Search Box Fixed */
        .search-container { display: flex; align-items: center; }
        .search-box { width: 0; opacity: 0; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); overflow: hidden; transform: translateX(10px); }
        .search-box.open { width: 200px; opacity: 1; transform: translateX(-5px); }
        .search-box input { width: 180px; padding: 8px 15px; background: #fff; border: 1.5px solid var(--v-red); border-radius: 20px; outline: none; font-size: 13px; }

        /* 沉底按键效果 */
        .search-trigger {
            width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
            border-radius: 50%; cursor: pointer; transition: 0.1s;
        }
        .search-trigger:active {
            background: rgba(0,0,0,0.15);
            box-shadow: inset 2px 2px 6px rgba(0,0,0,0.3);
            transform: scale(0.95);
        }

        .icon-search-v { width: 20px; height: 20px; position: relative; pointer-events: none; }
        .icon-search-v .c { width: 14px; height: 14px; border: 2px solid var(--v-red); border-radius: 50%; position: absolute; top: 0; left: 0; }
        .icon-search-v .l { width: 2px; height: 8px; background: var(--v-red); position: absolute; bottom: -1px; right: -1px; transform: rotate(-45deg); }

        /* Grid */
        #view-container { padding: 0 40px 40px 40px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; max-width: 1100px; margin: 0 auto; }
        .card { background: var(--card); border-radius: 12px; padding: 30px; border-left: 6px solid var(--v-orange); cursor: pointer; transition: 0.3s; position: relative; }
        .card:hover { transform: translateY(-4px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .card-h { font-family: 'Noto Serif SC', serif; font-size: 1.6em; color: var(--v-green); margin-bottom: 10px; }
        .card-desc { font-size: 14px; color: #888; margin-top: 10px; border-top: 1px solid #f0f0f0; padding-top: 10px; }
        
        .article { max-width: 800px; margin: 0 auto; background: #fff; padding: 50px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .hl { background: var(--hl); padding: 0 2px; border-radius: 2px; }
        .loading { display: flex; flex-direction: column; align-items: center; padding-top: 100px; color: white; font-weight: bold; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div id="site-logo-container" onclick="showNavMode()">
            <div class="knot"></div><div class="knot-line"></div>
            <div class="paper-tag"><div class="site-name-v">折立</div></div>
        </div>
        <div class="sidebar-nav">
            <div class="nav-item" id="nav-cat" onclick="showCategories()"><div>分类</div></div>
            <div class="nav-item" id="nav-recent" onclick="showRecent()"><div>最新</div></div>
        </div>
    </div>
    <div class="main-content">
        <div class="header-tools">
            <div class="search-container">
                <div class="search-box" id="sb">
                    <input type="text" id="sk" placeholder="输入并回车..." onkeypress="if(event.key==='Enter')exeSearch()">
                </div>
                <div class="search-trigger" onclick="toggleS()">
                    <div class="icon-search-v"><div class="c"></div><div class="l"></div></div>
                </div>
            </div>
        </div>
        <div id="view-container"></div>
    </div>

    <script>
        const repo = 'skakla/mmkkl';
        let data = [];

        async function init() {
            const v = document.getElementById('view-container');
            v.innerHTML = '<div class="loading">同步中...</div>';
            try {
                const r = await fetch(`https://api.github.com/repos/${repo}/issues?per_page=100&t=${Date.now()}`);
                if(!r.ok) throw new Error();
                data = await r.json();
                showNavMode(); // 初始进入导航模式
            } catch (e) {
                v.innerHTML = '<div class="card" style="margin:auto;max-width:300px"><h3>同步失败</h3><p>请检查网络或仓库权限。</p></div>';
            }
        }

        // 核心逻辑：显示“分类”和“最新”两个入口卡片
        function showNavMode() {
            setNav(null);
            const v = document.getElementById('view-container');
            v.innerHTML = `
                <div class="grid">
                    <div class="card" onclick="showCategories()">
                        <div class="card-h">分类</div>
                        <div class="card-desc">${Object.keys(countLabels()).length} 个主题笔记</div>
                    </div>
                    <div class="card" onclick="showRecent()">
                        <div class="card-h">最新</div>
                        <div class="card-desc">按时间排序的所有内容</div>
                    </div>
                </div>`;
        }

        function countLabels() {
            const m = {};
            data.forEach(i => i.labels.forEach(l => m[l.name] = (m[l.name] || 0) + 1));
            return m;
        }

        function showCategories() {
            setNav('nav-cat');
            const v = document.getElementById('view-container');
            const m = countLabels();
            let h = '<div class="grid">';
            for(const [name, count] of Object.entries(m)) {
                h += `<div class="card" onclick="showLabelPosts('${name}')"><div class="card-h"># ${name}</div><div class="card-desc">${count} 条笔记</div></div>`;
            }
            v.innerHTML = h + '</div>';
        }

        function showLabelPosts(ln) {
            setNav(null);
            const v = document.getElementById('view-container');
            const f = data.filter(i => i.labels.some(l => l.name === ln));
            let h = `<div style="color:white; margin-bottom:20px; font-size:1.2em;"># ${ln}</div><div class="grid">`;
            f.forEach(i => h += `<div class="card" onclick="showA(${i.number})"><div class="card-h">${i.title}</div></div>`);
            v.innerHTML = h + '</div>';
        }

        function showRecent() {
            setNav('nav-recent');
            const v = document.getElementById('view-container');
            let h = '<div class="grid">';
            data.forEach(i => h += `<div class="card" onclick="showA(${i.number})"><div class="card-h">${i.title}</div><div class="card-desc">${(i.body || '').substring(0,30)}...</div></div>`);
            v.innerHTML = h + '</div>';
        }

        function toggleS() {
            const b = document.getElementById('sb');
            const k = document.getElementById('sk');
            if(k.value.trim() && b.classList.contains('open')) { exeSearch(); return; }
            b.classList.toggle('open');
            if(b.classList.contains('open')) k.focus();
        }

        function exeSearch() {
            const k = document.getElementById('sk').value.trim();
            if(!k) return;
            setNav(null);
            const v = document.getElementById('view-container');
            const reg = new RegExp(`(${k})`, 'gi');
            const res = data.filter(i => (i.title + i.body).match(reg));
            let h = `<div style="color:white; margin-bottom:20px;">关于 "${k}" 的结果 (${res.length})</div><div class="grid">`;
            res.forEach(i => h += `<div class="card" onclick="showA(${i.number},'${k}')"><div class="card-h">${i.title.replace(reg,'<span class="hl">$1</span>')}</div></div>`);
            v.innerHTML = h + '</div>';
            document.getElementById('sb').classList.remove('open');
        }

        function showA(n, k = null) {
            setNav(null);
            const v = document.getElementById('view-container');
            const i = data.find(x => x.number === n);
            let b = i.body || '';
            if(k) b = b.replace(new RegExp(`(${k})`, 'gi'), '<span class="hl">$1</span>');
            v.innerHTML = `<div class="article"><h1 style="font-family:'Noto Serif SC'">${i.title}</h1><div style="line-height:1.8; white-space:pre-wrap;">${b}</div></div>`;
            window.scrollTo(0,0);
        }

        function setNav(id) {
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            if(id) document.getElementById(id).classList.add('active');
        }

        init();
    </script>
</body>
</html>
