<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>折立 | 数字化笔记</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --v-red: #BB3E00; --v-orange: #F7AD45; --v-green: #657C6A; 
            --v-gray: #A2B9A7; --paper: #fdf6e3; --card: #ffffff; --hl: #ffee58;
            --text-main: #2c1e14; --text-sub: #555555;
            --side-w: 85px; --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        
        body, html { 
            margin: 0; padding: 0; background: var(--v-gray); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--text-main); height: 100%; width: 100%; overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* --- 侧边栏 (PC) & 底部导航 (Mobile) --- */
        .sidebar { 
            position: fixed; top: 0; left: 0; width: var(--side-w); height: 100%; 
            background: var(--v-green); z-index: 1000; display: flex; 
            flex-direction: column; align-items: center; box-shadow: 2px 0 10px rgba(0,0,0,0.1);
        }

        #site-logo-container { margin-top: 30px; display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: var(--transition); }
        #site-logo-container:hover { transform: translateY(-2px); }
        
        .knot { width: 24px; height: 24px; background: var(--v-red); transform: rotate(45deg); border-radius: 2px; position: relative; box-shadow: 2px 2px 5px rgba(0,0,0,0.2); }
        .knot-line { width: 2px; height: 20px; background: var(--v-red); margin: -1px 0; z-index: 2; }
        .paper-tag { background: var(--paper); padding: 12px 8px; border-radius: 2px; box-shadow: 3px 3px 12px rgba(0,0,0,0.15); transform: rotate(-1.5deg); }
        .site-name-v { writing-mode: vertical-rl; color: var(--text-main); font-family: 'Noto Serif SC', serif; font-size: 20px; font-weight: 900; letter-spacing: 4px; }

        .sidebar-nav { margin-top: auto; margin-bottom: 40px; display: flex; flex-direction: column; gap: 25px; align-items: center; }
        .nav-item { cursor: pointer; transition: var(--transition); text-align: center; }
        .nav-item div { color: rgba(255,255,255,0.7); font-family: 'Noto Serif SC', serif; font-size: 16px; font-weight: 700; }
        .nav-item:hover div { color: var(--paper); }
        .nav-item.active div { color: var(--v-orange); transform: scale(1.1); }

        /* --- 主内容区 --- */
        .main-content { margin-left: var(--side-w); min-height: 100vh; padding: 20px 40px 60px 40px; max-width: 1400px; }
        
        .header-tools { display: flex; justify-content: flex-end; align-items: center; padding: 15px 0; margin-bottom: 20px; position: sticky; top: 0; z-index: 900; }
        
        .search-container { 
            display: none; align-items: center; background: white; 
            border-radius: 12px; padding: 4px; position: absolute; right: 60px; 
            width: 300px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); animation: slideIn 0.3s ease;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
        
        .search-container.show { display: flex; }
        .search-container input { border: none; outline: none; padding: 10px 15px; flex: 1; font-size: 15px; background: transparent; }
        .search-btn { background: var(--v-red); color: white; border: none; padding: 8px 18px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        
        .search-trigger { width: 48px; height: 48px; background: var(--card); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.05); transition: var(--transition); }
        .search-trigger:hover { transform: scale(1.05); box-shadow: 0 6px 15px rgba(0,0,0,0.1); }
        .icon-search-v { width: 20px; height: 20px; border: 2.5px solid var(--v-red); border-radius: 50%; position: relative; }
        .icon-search-v::after { content: ''; position: absolute; width: 2.5px; height: 8px; background: var(--v-red); bottom: -6px; right: -5px; transform: rotate(-45deg); }

        /* --- 布局网格 --- */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; }
        .card { 
            background: var(--card); border-radius: 16px; padding: 25px; 
            border-left: 6px solid var(--v-orange); cursor: pointer; 
            transition: var(--transition); position: relative; overflow: hidden;
        }
        .card:hover { transform: translateY(-5px); box-shadow: 0 12px 30px rgba(0,0,0,0.12); }
        .card-h { font-family: 'Noto Serif SC', serif; font-size: 1.35em; color: var(--v-green); font-weight: 900; margin-bottom: 12px; }
        
        .home-layout { display: grid; grid-template-columns: 300px 1fr; gap: 30px; }
        .random-box { 
            background: var(--paper); border-radius: 20px; padding: 50px; 
            position: relative; box-shadow: inset 0 0 50px rgba(0,0,0,0.03), 0 10px 30px rgba(0,0,0,0.05);
        }
        .random-title { font-family: 'Noto Serif SC', serif; font-size: 2.5em; margin-bottom: 20px; line-height: 1.2; }
        .random-snippet { font-size: 18px; line-height: 1.8; color: var(--text-sub); margin-bottom: 40px; }

        /* --- 文章详情 --- */
        .article { max-width: 850px; margin: 0 auto; background: #fff; padding: 60px 50px; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .post-body { line-height: 1.9; font-size: 18px; color: #333; letter-spacing: 0.5px; }
        .post-body img { display: block; max-width: 100%; border-radius: 12px; margin: 30px auto; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }

        /* --- 手机端适配 --- */
        @media (max-width: 850px) {
            :root { --side-w: 0px; }
            .sidebar { 
                width: 100%; height: 70px; top: auto; bottom: 0; 
                flex-direction: row; padding: 0 15px; 
                background: rgba(101, 124, 106, 0.95);
                backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
                border-top: 1px solid rgba(255,255,255,0.1);
            }
            #site-logo-container { margin-top: 0; flex-direction: row; gap: 10px; }
            .knot, .knot-line { display: none; }
            .paper-tag { padding: 6px 12px; transform: none; }
            .site-name-v { writing-mode: horizontal-tb; font-size: 18px; letter-spacing: 2px; }
            
            .sidebar-nav { margin: 0 0 0 auto; flex-direction: row; gap: 20px; }
            .main-content { margin-left: 0; padding: 15px 15px 100px 15px; }
            
            .home-layout { grid-template-columns: 1fr; }
            .left-column { order: 2; }
            .right-column { order: 1; }
            
            .random-box { padding: 30px 20px; min-height: auto; }
            .random-title { font-size: 1.8em; }
            
            .search-container { 
                position: fixed; top: 0; left: 0; right: 0; width: 100%; 
                border-radius: 0; z-index: 1001; padding: 10px; 
            }
            .article { padding: 30px 20px; border-radius: 0; margin: -15px; width: calc(100% + 30px); }
            .article h1 { font-size: 1.8em; }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div id="site-logo-container" onclick="renderHome()">
            <div class="knot"></div><div class="knot-line"></div>
            <div class="paper-tag"><div class="site-name-v">折立</div></div>
        </div>
        <div class="sidebar-nav">
            <div class="nav-item" id="nav-cat" onclick="renderCategories()"><div>分类</div></div>
            <div class="nav-item" id="nav-recent" onclick="renderRecent()"><div>最新</div></div>
        </div>
    </div>

    <div class="main-content">
        <div class="header-tools">
            <div class="search-wrapper">
                <div class="search-container" id="sc">
                    <input type="text" id="sk" placeholder="搜索文章..." onkeypress="if(event.key==='Enter')exeSearch()">
                    <button class="search-btn" onclick="exeSearch()">搜索</button>
                </div>
                <div class="search-trigger" onclick="toggleS()">
                    <div class="icon-search-v"></div>
                </div>
            </div>
        </div>
        <div id="view-container"></div>
    </div>

    <script>
        // 核心逻辑保持不变，确保数据获取和渲染正常
        const repo = 'skakla/mmkkl';
        let data = JSON.parse(localStorage.getItem('blog_cache') || '[]');
        const view = document.getElementById('view-container');

        async function init() {
            if(data.length > 0) renderHome();
            try {
                const r = await fetch(`https://api.github.com/repos/${repo}/issues?per_page=100&t=${Date.now()}`);
                if (r.ok) {
                    data = await r.json();
                    localStorage.setItem('blog_cache', JSON.stringify(data));
                    renderHome();
                }
            } catch (e) { console.error("Fetch error:", e); }
        }

        function toggleS() {
            const sc = document.getElementById('sc');
            sc.classList.toggle('show');
            if(sc.classList.contains('show')) document.getElementById('sk').focus();
        }

        function updateUI(html, navId = null) {
            view.innerHTML = html;
            document.querySelectorAll('.nav-item').forEach(n => n.classList.toggle('active', n.id === navId));
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // --- 渲染函数 ---
        function renderHome() {
            if(!data.length) return;
            const pool = data.filter(p => p.labels.some(l => l.name === '存疑之论' || l.name === '转载文章'));
            const displayPool = pool.length > 0 ? pool : data;
            
            // 12小时更新一次随机文章
            const NOW = Date.now();
            let cache = JSON.parse(localStorage.getItem('home_random_post') || '{}');
            let randomPost;
            if (!cache.postId || (NOW - cache.time > 43200000)) {
                randomPost = displayPool[Math.floor(Math.random() * displayPool.length)];
                localStorage.setItem('home_random_post', JSON.stringify({ postId: randomPost.number, time: NOW }));
            } else {
                randomPost = data.find(p => p.number === cache.postId) || displayPool[0];
            }

            const activeTag = randomPost.labels[0]?.name || "精选";
            const snippet = (randomPost.body || "").replace(/!\[.*?\]\(.*?\)/g, "").substring(0, 180) + "...";
            const labels = [...new Set(data.flatMap(i => i.labels.map(l => l.name)))].slice(0, 6);
            const recents = data.slice(0, 5).map(i => i.title);

            let h = `<div class="home-layout">
                <div class="left-column">
                    <div class="card" onclick="renderCategories()" style="margin-bottom:20px">
                        <div class="card-h">主题分类</div>
                        <ul class="card-list" style="list-style:none;padding:0;line-height:2">
                            ${labels.map(l => `<li style="color:var(--v-green);font-weight:bold"># ${l}</li>`).join('')}
                        </ul>
                    </div>
                    <div class="card" onclick="renderRecent()">
                        <div class="card-h">最近更新</div>
                        <ul class="card-list" style="list-style:none;padding:0;font-size:14px;color:var(--text-sub)">
                            ${recents.map(t => `<li style="margin-bottom:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">• ${t}</li>`).join('')}
                        </ul>
                    </div>
                </div>
                <div class="right-column">
                    <div class="random-box">
                        <div style="color:var(--v-red);font-weight:900;margin-bottom:10px;font-size:14px">今日推文 · ${activeTag}</div>
                        <div class="random-title">${randomPost.title}</div>
                        <div class="random-snippet">${snippet}</div>
                        <div class="read-more-btn" onclick="renderArticle(${randomPost.number})" style="display:inline-block;background:var(--v-red);color:white;padding:12px 35px;border-radius:10px;cursor:pointer;font-weight:bold">阅读原文</div>
                    </div>
                </div>
            </div>`;
            updateUI(h);
        }

        function renderArticle(n, k = null) {
            const i = data.find(x => x.number === n);
            if(!i) return;
            let b = i.body || '';
            // 转换图片
            b = b.replace(/!\[.*?\]\((.*?)\)/g, '<img src="$1" alt="image">');
            // 高亮搜索词
            if(k) {
                const reg = new RegExp(`(${k.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
                b = b.replace(reg, '<span class="hl">$1</span>');
            }
            updateUI(`<div class="article">
                <div style="color:var(--v-red);font-weight:bold;margin-bottom:10px"># ${i.labels.map(l=>l.name).join(' # ')}</div>
                <h1>${i.title}</h1>
                <div class="post-body">${b}</div>
                <div style="margin-top:50px;padding-top:20px;border-top:1px solid #eee;text-align:center">
                    <button onclick="renderHome()" style="background:none;border:1px solid var(--v-green);color:var(--v-green);padding:10px 20px;border-radius:8px;cursor:pointer">返回首页</button>
                </div>
            </div>`);
        }

        function renderRecent() {
            let h = '<div class="grid">';
            data.forEach(i => h += `<div class="card" onclick="renderArticle(${i.number})"><div class="card-h">${i.title}</div><div style="color:var(--text-sub);font-size:13px">${i.created_at.split('T')[0]}</div></div>`);
            updateUI(h + '</div>', 'nav-recent');
        }

        function renderCategories() {
            const m = {};
            data.forEach(i => i.labels.forEach(l => {
                if(!m[l.name]) m[l.name] = [];
                m[l.name].push(i);
            }));
            let h = '<div class="grid">';
            for(const name in m) {
                h += `<div class="card" onclick="renderLabelPosts('${name}')"><div class="card-h"># ${name}</div><div style="color:var(--text-sub)">共 ${m[name].length} 篇文章</div></div>`;
            }
            updateUI(h + '</div>', 'nav-cat');
        }

        function renderLabelPosts(ln) {
            const f = data.filter(i => i.labels.some(l => l.name === ln));
            let h = `<div style="margin-bottom:20px;font-size:20px;font-weight:900;color:white">分类：${ln}</div><div class="grid">`;
            f.forEach(i => h += `<div class="card" onclick="renderArticle(${i.number})"><div class="card-h">${i.title}</div></div>`);
            updateUI(h + '</div>');
        }

        function exeSearch() {
            const k = document.getElementById('sk').value.trim();
            if(!k) return;
            const reg = new RegExp(`(${k.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
            const res = data.filter(i => (i.title + (i.body||'')).match(reg));
            let h = `<div style="margin-bottom:20px;font-weight:900;color:white;">“${k}” 的搜索结果 (${res.length})</div><div class="grid">`;
            res.forEach(i => {
                h += `<div class="card" onclick="renderArticle(${i.number},'${k}')"><div class="card-h">${i.title.replace(reg, '<span class="hl">$1</span>')}</div></div>`;
            });
            updateUI(h + '</div>');
            document.getElementById('sc').classList.remove('show');
        }

        init();
    </script>
</body>
</html>
