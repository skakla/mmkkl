<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <title>明站 - 全新的开始</title>
    <style>
        /* 1. 基础装修：护眼纸质书颜色 (#f4f1ea) */
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #f4f1ea; /* 护眼纸色 */
            font-family: 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            overflow-x: hidden; /* 防止横向滚动条 */
        }

        /* 2. 主角：棕色方形 */
        .brown-square {
            position: fixed; top: 0; right: 0;
            width: 100vw; height: 100vh;
            background-color: #7a5230; /* 棕色 */
            display: flex; justify-content: center; align-items: center;
            color: #f4f1ea; font-size: 2.5em; letter-spacing: 4px;
            
            /* 定义滑动的动画 (持续3秒，滑到最左侧) */
            animation: slideInAndStick 3s ease-out forwards;
            z-index: 100; /* 确保在最上层 */
        }

        /* 3. 滑动与掩盖动画定义 */
        @keyframes slideInAndStick {
            0% { transform: translateX(100vw); }   /* 初始：在屏幕最右侧外 */
            60% { transform: translateX(0); }       /* 60%时间：完全到达屏幕中间 */
            100% { transform: translateX(-50vw); }   /* 最终：掩盖一半在左侧外 */
        }

        /* 4. 裸露出来的标签内容区域 (从滑动的方形里跳出来) */
        #content-area {
            position: absolute; left: 50vw; top: 0; /* 在屏幕右半部分 */
            width: 50vw; padding: 40px; box-sizing: border-box;
            
            /* 定义内容跳出来的动画 (在3秒后开始) */
            opacity: 0; transform: translateY(20px);
            animation: contentPopUp 1s ease-out 3s forwards;
            z-index: 50;
        }

        /* 5. 网页顶部名字：明站 */
        #site-title {
            position: fixed; top: 20px; right: 30px;
            font-size: 1.8em; font-weight: bold;
            color: #7a5230; text-shadow: 1px 1px 1px #fff;
            opacity: 0; animation: contentPopUp 1s ease-out 3.5s forwards;
            z-index: 200;
        }

        /* 内容跳出动画定义 */
        @keyframes contentPopUp {
            to { opacity: 1; transform: translateY(0); }
        }

        /* 6. 标签卡片样式 */
        .label-pill {
            display: inline-block; padding: 5px 15px; border-radius: 20px;
            background-color: #7a5230; color: #f4f1ea;
            font-size: 14px; margin-right: 10px; margin-bottom: 10px;
            animation: labelPop 0.5s ease-out backwards;
            transition: 0.3s;
        }
        .label-pill:hover { transform: scale(1.1); box-shadow: 0 4px 10px rgba(122,82,48,0.3); }

        /* 笔记卡片样式 */
        .card { 
            background: #fff; padding: 25px; border-radius: 12px; margin-bottom: 25px;
            border-left: 5px solid #7a5230; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .card h3 { color: #7a5230; margin-top: 0; font-size: 1.4em; }
        .issue-body { color: #555; white-space: pre-wrap; margin-top: 10px; line-height: 1.6; }
    </style>
</head>
<body>
    <div id="site-title">明站</div>

    <div class="brown-square">
        <div>全新的·明站</div>
    </div>

    <div id="content-area">
        <div id="feed">
            <p>正在抓取云端数据...</p>
        </div>
    </div>

    <script>
        // 核心：自动把你的 Issues变成网页上的标签
        fetch('https://api.github.com/repos/skakla/mmkkl/issues')
            .then(res => res.json())
            .then(data => {
                const feed = document.getElementById('feed');
                feed.innerHTML = ''; 
                data.forEach((item, index) => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.style.animation = `contentPopUp 0.8s ease-out ${3 + index * 0.2}s backwards`;
                    
                    // 获取 GitHub 标签
                    let labelsHtml = item.labels.map(l => 
                        `<span class="label-pill" style="background:#${l.color}">${l.name}</span>`
                    ).join('');

                    card.innerHTML = `
                        <div>${labelsHtml || '<span class="label-pill" style="background:#666">未分类</span>'}</div>
                        <h3>${item.title}</h3>
                        <div class="issue-body">${item.body}</div>
                    `;
                    feed.appendChild(card);
                });
            });
    </script>
</body>
</html>
