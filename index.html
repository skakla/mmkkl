<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Skakla 的灵感空间</title>
    <style>
        /* 基础样式：深色酷炫 */
        body { background: #121212; color: #e0e0e0; font-family: sans-serif; padding: 40px 20px; max-width: 800px; margin: 0 auto; }
        h1 { color: #ff4500; text-align: center; margin-bottom: 40px; }
        
        /* 进场动画：由下往上滑入 */
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* 卡片装修 */
        .card { 
            background: #1e1e1e; padding: 20px; border-radius: 10px; margin-bottom: 20px;
            border-left: 5px solid #ff4500; animation: fadeInUp 0.6s ease-out both;
            transition: 0.3s; /* 悬停动画时间 */
        }
        .card:hover { transform: scale(1.02); box-shadow: 0 5px 15px rgba(255,69,0,0.3); }

        /* 标签样式 */
        .tag { 
            display: inline-block; padding: 2px 10px; border-radius: 15px; 
            font-size: 0.7em; margin-right: 8px; color: white; background: #ff4500;
        }
        .issue-body { color: #bbb; white-space: pre-wrap; margin-top: 10px; font-size: 0.95em; }
    </style>
</head>
<body>
    <h1>Skakla's Space</h1>
    <div id="feed"><p>正在加载云端分类笔记...</p></div>

    <script>
        fetch('https://api.github.com/repos/skakla/mmkkl/issues')
            .then(res => res.json())
            .then(data => {
                const feed = document.getElementById('feed');
                feed.innerHTML = ''; 
                data.forEach((item, index) => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.style.animationDelay = (index * 0.15) + 's'; // 让卡片一个接一个跳出来
                    
                    // 把 GitHub 的标签转化成网页上的小标签
                    let tagsHtml = '';
                    item.labels.forEach(l => {
                        tagsHtml += `<span class="tag" style="background:#${l.color}">${l.name}</span>`;
                    });

                    card.innerHTML = `
                        <div>${tagsHtml}</div>
                        <h3>${item.title}</h3>
                        <div class="issue-body">${item.body}</div>
                    `;
                    feed.appendChild(card);
                });
            });
    </script>
</body>
</html>
