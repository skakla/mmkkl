<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>折立</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --v-red: #BB3E00; --v-orange: #F7AD45; --v-green: #657C6A; 
            --v-gray: #A2B9A7; --paper: #fdf6e3; --card: #ffffff; --hl: #ffee58;
            --text-main: #2c1e14; --text-sub: #444444;
            --side-w: 80px;
        }
        body, html { margin: 0; padding: 0; background: var(--v-gray); font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        
        .sidebar { position: fixed; top: 0; left: 0; width: var(--side-w); height: 100vh; background: var(--v-green); z-index: 1000; display: flex; flex-direction: column; align-items: center; }
        #site-logo-container { margin-top: 25px; display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .knot { width: 22px; height: 22px; background: var(--v-red); transform: rotate(45deg); border-radius: 2px; position: relative; }
        .knot::after { content: ''; position: absolute; top: 4px; left: 4px; right: 4px; bottom: 4px; border: 1px solid rgba(255,255,255,0.4); }
        .knot-line { width: 1.5px; height: 18px; background: var(--v-red); margin: -1px 0; z-index: 2; }
        .paper-tag { background: var(--paper); padding: 10px 6px; border-radius: 2px; box-shadow: 2px 2px 5px rgba(0,0,0,0.15); transform: rotate(-1.5deg); display: flex; justify-content: center; width: 32px; box-sizing: border-box; }
        .site-name-v { writing-mode: vertical-rl; color: var(--text-main); font-family: 'Noto Serif SC', serif; font-size: 18px; font-weight: 900; letter-spacing: 4px; }

        .sidebar-nav { margin-top: auto; margin-bottom: 35px; display: flex; flex-direction: column; gap: 20px; align-items: center; }
        .nav-item { cursor: pointer; opacity: 0.7; padding: 5px; }
        .nav-item div { color: var(--paper); font-family: 'Noto Serif SC', serif; font-size: 15px; font-weight: 900; }
        .nav-item.active div { color: var(--v-orange); }

        .main-content { margin-left: var(--side-w); min-height: 100vh; }
        .header-tools { display: flex; justify-content: flex-end; align-items: center; padding: 25px 30px; max-width: 1100px; margin: 0 auto; height: 50px; position: relative; }

        /* 搜索框：整合一体化设计 */
        .search-container { 
            display: none; align-items: center; background: rgba(255,255,255,0.95); 
            backdrop-filter: blur(10px); border: 2px solid var(--v-red); border-radius: 10px; 
            padding: 4px; position: absolute; right: 85px; width: 200px; z-index: 2000;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }
        .search-container.show { display: flex; }
        .search-container input { border: none; outline: none; padding: 8px; flex: 1; font-size: 14px; background: transparent; width: 30px; }
        .search-btn { background: var(--v-red); color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: bold; flex-shrink: 0; }

        .search-trigger { width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .icon-search-v { width: 18px; height: 18px; position: relative; }
        .icon-search-v .c { width: 12px; height: 12px; border: 2.5px solid var(--v-red); border-radius: 50%; position: absolute; top: 0; left: 0; }
        .icon-search-v .l { width: 3px; height: 7px; background: var(--v-red); position: absolute; bottom: -1px; right: -1px; transform: rotate(-45deg); }

        #view-container { padding: 0 40px 40px 40px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; max-width: 1100px; margin: 0 auto; }
        .card { background: var(--card); border-radius: 12px; padding: 25px; border-left: 6px solid var(--v-orange); cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .card-h { font-family: 'Noto Serif SC', serif; font-size: 1.3em; color: var(--v-green); font-weight: 900; margin: 0; }
        .card-list { list-style: none; padding: 0; margin: 14px 0 0 0; border-top: 1.5px solid #eee; padding-top: 12px; }
        .card-list li { font-size: 14px; color: var(--text-sub); padding: 5px 0; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .search-preview { margin-top: 12px; font-size: 14px; color: var(--text-sub); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 5; -webkit-box-orient: vertical; overflow: hidden; border-top: 1.5px solid #eee; padding-top: 10px; }

        /* 文章与图片：终极防拉伸 */
        .article { max-width: 800px; margin: 0 auto; background: #fff; padding: 40px; border-radius: 12px; }
        .article h1 { font-family: 'Noto Serif SC'; color: var(--v-red); margin-top: 0; font-size: 1.8em; }
        .post-body { line-height: 1.9; white-space: pre-wrap; color: var(--text-main); font-weight: 500; font-size: 17px; }
        
        /* 这里的设置确保图片绝不拉伸 */
        .post-body img { 
            display: block; 
            max-width: 100% !important; 
            height: auto !important; 
            margin: 30px auto; 
            border-radius: 8px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .hl { background: var(--hl); font-weight: bold; border-radius: 2px; padding: 0 2px; }

        @media screen and (max-width: 768px) {
            :root { --side-w: 0px; }
            .sidebar { top: auto; bottom: 0; width: 100%; height: 60px; flex-direction: row; padding: 0 20px; box-sizing: border-box; }
            #site-logo-container { margin-top: 0; flex-direction: row; gap: 10px; }
            .knot-line { display: none; }
            .site-name-v { writing-mode: horizontal-tb; font-size: 16px; }
            .sidebar-nav { margin: 0 0 0 auto; flex-direction: row; gap: 25px; }
            .main-content { margin-left: 0; padding-bottom: 80px; }
            #view-container { padding: 0 20px 20px 20px; }
            .grid { grid-template-columns: 1fr; }
            .search-container { right: 60px; width: 150px; }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div id="site-logo-container" onclick="renderHome()">
            <div class="knot"></div><div class="knot-line"></div>
            <div class="paper-tag"><div class="site-name-v">折立</div></div>
        </div>
        <div class="sidebar-nav">
            <div class="nav-item" id="nav-cat" onclick="renderCategories()"><div>分类</div></div>
            <div class="nav-item" id="nav-recent" onclick="renderRecent()"><div>最新</div></div>
        </div>
    </div>
    <div class="main-content">
        <div class="header-tools">
            <div class="search-container" id="sc">
                <input type="text" id="sk" placeholder="搜一下..." onkeypress="if(event.key==='Enter')exeSearch()">
                <button class="search-btn" onclick="exeSearch()">搜索</button>
            </div>
            <div class="search-trigger" onclick="toggleS()">
                <div class="icon-search-v"><div class="c"></div><div class="l"></div></div>
            </div>
        </div>
        <div id="view-container"></div>
    </div>

    <script>
        const repo = 'skakla/mmkkl';
        let data = JSON.parse(localStorage.getItem('blog_cache') || '[]');
        const view = document.getElementById('view-container');

        async function init() {
            if(data.length > 0) renderHome(); // 先用缓存撑场面
            try {
                const r = await fetch(`https://api.github.com/repos/${repo}/issues?per_page=100&t=${Date.now()}`);
                if (r.ok) {
                    data = await r.json();
                    localStorage.setItem('blog_cache', JSON.stringify(data)); // 更新缓存
                    if(view.innerHTML.includes('⚠️')) renderHome(); // 如果之前报错了，现在修好它
                } else if(data.length === 0) {
                    throw new Error();
                }
            } catch (e) {
                if(data.length === 0) {
                    view.innerHTML = '<div style="color:white;text-align:center;padding:50px;font-weight:900;">⚠️ 暂时无法连接至 GitHub<br><small style="font-weight:400;opacity:0.8;">匿名访问次数已达上限，请1小时后再试</small></div>';
                }
            }
        }

        function updateUI(html, navId = null) {
            view.innerHTML = html;
            document.querySelectorAll('.nav-item').forEach(n => n.classList.toggle('active', n.id === navId));
            window.scrollTo(0,0);
        }

        function renderHome() {
            const labels = [...new Set(data.flatMap(i => i.labels.map(l => l.name)))].slice(0, 5);
            const recents = data.slice(0, 5).map(i => i.title);
            let h = '<div class="grid">';
            if(labels.length) h += `<div class="card" onclick="renderCategories()"><div class="card-h">分类</div><ul class="card-list">${labels.map(l => `<li># ${l}</li>`).join('')}</ul></div>`;
            if(recents.length) h += `<div class="card" onclick="renderRecent()"><div class="card-h">最新</div><ul class="card-list">${recents.map(t => `<li>${t}</li>`).join('')}</ul></div>`;
            updateUI(h + '</div>');
        }

        function renderCategories() {
            const m = {};
            data.forEach(i => i.labels.forEach(l => {
                if(!m[l.name]) m[l.name] = [];
                if(m[l.name].length < 5) m[l.name].push(i.title);
            }));
            let h = '<div class="grid">';
            for(const name in m) {
                h += `<div class="card" onclick="renderLabelPosts('${name}')"><div class="card-h"># ${name}</div><ul class="card-list">${m[name].map(t => `<li>${t}</li>`).join('')}</ul></div>`;
            }
            updateUI(h + '</div>', 'nav-cat');
        }

        function renderRecent() {
            let h = '<div class="grid">';
            data.forEach(i => h += `<div class="card" onclick="renderArticle(${i.number})"><div class="card-h">${i.title}</div></div>`);
            updateUI(h + '</div>', 'nav-recent');
        }

        function renderLabelPosts(ln) {
            const f = data.filter(i => i.labels.some(l => l.name === ln));
            let h = `<div style="margin-bottom:20px; font-weight:900; color:white; font-size:1.2em;"># ${ln}</div><div class="grid">`;
            f.forEach(i => h += `<div class="card" onclick="renderArticle(${i.number})"><div class="card-h">${i.title}</div></div>`);
            updateUI(h + '</div>');
        }

        function renderArticle(n, k = null) {
            const i = data.find(x => x.number === n);
            if(!i) return;
            let b = (i.body || '').replace(/!\[.*?\]\((.*?)\)/g, '<img src="$1">');
            if(k) {
                const safeK = k.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                b = b.replace(new RegExp(`(${safeK})`, 'gi'), '<span class="hl">$1</span>');
            }
            updateUI(`<div class="article"><h1>${i.title}</h1><div class="post-body">${b}</div></div>`);
        }

        function toggleS() {
            const s = document.getElementById('sc');
            s.classList.toggle('show');
            if(s.classList.contains('show')) document.getElementById('sk').focus();
        }

        function exeSearch() {
            const k = document.getElementById('sk').value.trim();
            if(!k) return;
            const safeK = k.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            const reg = new RegExp(`(${safeK})`, 'gi');
            const res = data.filter(i => (i.title + (i.body||'')).match(reg));
            let h = `<div style="margin-bottom:20px; color:white; font-weight:bold;">${res.length} 个结果</div><div class="grid">`;
            res.forEach(i => {
                let pText = (i.body || "").replace(/!\[.*?\]\(.*?\)/g, "[图片]").replace(/\n/g, " ");
                const idx = pText.toLowerCase().indexOf(k.toLowerCase());
                let preview = idx !== -1 ? (idx>20?"...":"") + pText.substring(Math.max(0,idx-20), idx+100) + "..." : "";
                h += `<div class="card" onclick="renderArticle(${i.number},'${k}')">
                    <div class="card-h">${i.title.replace(reg, '<span class="hl">$1</span>')}</div>
                    ${preview ? `<div class="search-preview">${preview.replace(reg, '<span class="hl">$1</span>')}</div>` : ''}
                </div>`;
            });
            updateUI(h + '</div>');
            document.getElementById('sc').classList.remove('show');
        }

        init();
    </script>
</body>
</html>
