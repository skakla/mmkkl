<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>折立 - 精准搜索版</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@900&display=swap" rel="stylesheet">
    <style>
        :root {
            --v-red: #BB3E00; --v-orange: #F7AD45; --v-green: #657C6A; 
            --v-gray: #A2B9A7; --paper: #fdf6e3; --card: #ffffff;
            --highlight: #ffee58;
        }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--v-gray); font-family: sans-serif; overflow: hidden; }
        
        /* 侧边栏 */
        .sidebar { position: fixed; top: 0; left: 0; width: 80px; height: 100vh; background: var(--v-green); z-index: 100; display: flex; flex-direction: column; align-items: center; }
        #site-logo-container { margin-top: 25px; display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .knot { width: 24px; height: 24px; background: var(--v-red); transform: rotate(45deg); border-radius: 2px; position: relative; }
        .knot-line { width: 1.5px; height: 18px; background: var(--v-red); margin: -1px 0; }
        .paper-tag { background: var(--paper); padding: 10px 6px; border-radius: 2px; transform: rotate(-1.5deg); display: flex; justify-content: center; width: 32px; box-sizing: border-box; }
        .site-name-v { writing-mode: vertical-rl; color: #2c1e14; font-family: 'Noto Serif SC', serif; font-size: 18px; font-weight: 900; letter-spacing: 4px; text-align: center; }

        /* 底部导航 */
        .sidebar-nav { margin-top: auto; margin-bottom: 30px; display: flex; flex-direction: column; gap: 15px; }
        .nav-item { cursor: pointer; display: flex; flex-direction: column; align-items: center; padding: 8px; }
        .nav-item div { writing-mode: vertical-rl; color: var(--paper); font-family: 'Noto Serif SC', serif; font-size: 14px; letter-spacing: 2px; opacity: 0.6; }
        .nav-item.active div { color: var(--v-orange); opacity: 1; }

        .main-content { margin-left: 80px; flex: 1; overflow-y: auto; height: 100vh; box-sizing: border-box; }

        /* --- 【极简矢量搜索栏】 --- */
        .header-search-bar { display: flex; justify-content: flex-end; align-items: center; padding: 20px 40px; max-width: 1000px; margin: 0 auto; }
        
        .search-input-wrapper { position: relative; width: 0; overflow: hidden; opacity: 0; transition: width 0.4s ease, opacity 0.3s; display: flex; align-items: center; }
        .search-input-wrapper.open { width: 280px; opacity: 1; }
        .search-input-wrapper input { width: 100%; padding: 10px 40px 10px 15px; background: #fff; border: 2px solid var(--v-red); border-radius: 4px; outline: none; }

        /* 极简放大镜图标绘制 */
        .icon-search { width: 20px; height: 20px; position: relative; cursor: pointer; transition: 0.3s; }
        .icon-search .circle { width: 14px; height: 14px; border: 2.5px solid var(--v-red); border-radius: 50%; position: absolute; top: 0; left: 0; }
        .icon-search .line { width: 2.5px; height: 8px; background: var(--v-red); position: absolute; bottom: -2px; right: -1px; transform: rotate(-45deg); }
        #search-toggle { padding: 10px; z-index: 51; display: flex; align-items: center; }
        #search-toggle:hover .icon-search .circle, #search-toggle:hover .icon-search .line { background: var(--v-orange); border-color: var(--v-orange); }

        /* 视图容器 */
        #view-container { padding: 0 40px 40px 40px; box-sizing: border-box; }
        .loader-wrapper { display: flex; justify-content: center; align-items: center; height: 60vh; }
        .spinner { width: 30px; height: 30px; border: 3px solid #eee; border-top: 3px solid var(--v-red); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* 九宫格布局 */
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; max-width: 1100px; margin: 0 auto; }
        .grid-item { background: var(--card); border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); transition: 0.3s; border-left: 6px solid var(--v-orange); cursor: pointer; overflow: hidden; }
        .grid-item:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        
        /* 搜索结果卡片 */
        .search-grid-item { padding: 25px; border-left-color: var(--v-red); }
        .search-result-title { font-family: 'Noto Serif SC', serif; font-size: 1.3em; color: var(--v-green); margin-bottom: 12px; }
        .search-result-body-preview { color: #555; line-height: 1.8; font-size: 14px; display: -webkit-box; -webkit-line-clamp: 5; -webkit-box-orient: vertical; overflow: hidden; }
        .search-highlight { background-color: var(--highlight); color: #000; padding: 0 2px; font-weight: bold; border-radius: 2px; }

        .list-view h2 { font-family: 'Noto Serif SC', serif; color: #fff; margin-bottom: 20px; }
        .article-view { max-width: 800px; margin: 0 auto; background: #fff; padding: 40px; border-radius: 12px; }
        .article-view h1 { font-family: 'Noto Serif SC', serif; color: var(--v-green); border-bottom: 1px solid #eee; padding-bottom: 15px; }
        .article-content { color: #333; line-height: 2; font-size: 17px; white-space: pre-wrap; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div id="site-logo-container" onclick="showHome()">
            <div class="knot"></div><div class="knot-line"></div>
            <div class="paper-tag"><div class="site-name-v">折立</div></div>
        </div>
        <div class="sidebar-nav">
            <div class="nav-item active" id="nav-cat" onclick="showHome()"><div>分类</div></div>
        </div>
    </div>
    
    <div class="main-content">
        <div class="header-search-bar">
            <div class="search-input-wrapper" id="search-wrapper">
                <input type="text" id="search-keywords" placeholder="搜索笔记..." onkeypress="if(event.key==='Enter')executeSearch()">
            </div>
            <div id="search-toggle" onclick="toggleSearch()">
                <div class="icon-search"><div class="circle"></div><div class="line"></div></div>
            </div>
        </div>
        <div id="view-container"></div>
    </div>

    <script>
        const repo = 'skakla/mmkkl';
        let allIssues = [];

        async function init() {
            document.getElementById('view-container').innerHTML = '<div class="loader-wrapper"><div class="spinner"></div></div>';
            try {
                const res = await fetch(`https://api.github.com/repos/${repo}/issues?per_page=100&t=${Date.now()}`);
                allIssues = await res.json();
                showHome();
            } catch (e) { console.error(e); }
        }

        function toggleSearch() {
            const w = document.getElementById('search-wrapper');
            const isOpen = w.classList.contains('open');
            if(!isOpen) { w.classList.add('open'); document.getElementById('search-keywords').focus(); }
            else { executeSearch(); }
        }

        function executeSearch() {
            const kw = document.getElementById('search-keywords').value.trim();
            if(!kw) { document.getElementById('search-wrapper').classList.remove('open'); return; }
            
            const container = document.getElementById('view-container');
            container.innerHTML = `<div class="list-view"><h2>搜索结果：${kw}</h2></div>`;
            
            const regex = new RegExp(`(${kw})`, 'gi');
            const filtered = allIssues.filter(i => (i.title+i.body).match(regex));

            let html = `<div class="grid-container">`;
            filtered.forEach(item => {
                const hTitle = item.title.replace(regex, '<span class="search-highlight">$1</span>');
                // 【精准定位关键词语境】
                const hBody = getSmartPreview(item.body || '', kw, regex);

                html += `
                    <div class="grid-item search-grid-item" onclick="showArticle(${item.number}, '${kw}')">
                        <div class="search-result-title">${hTitle}</div>
                        <div class="search-result-body-preview">${hBody}</div>
                    </div>`;
            });
            container.innerHTML += html + '</div>';
            document.getElementById('search-wrapper').classList.remove('open');
        }

        // --- 【核心预览算法】 ---
        function getSmartPreview(content, kw, regex) {
            const index = content.toLowerCase().indexOf(kw.toLowerCase());
            if (index === -1) return content.substring(0, 150); // 找不到就开头

            // 向前向后找语境，大概取关键词前50个字和后100个字
            const start = Math.max(0, index - 50);
            const end = Math.min(content.length, index + 150);
            let snippet = content.substring(start, end);
            
            if (start > 0) snippet = "..." + snippet;
            if (end < content.length) snippet = snippet + "...";

            // 再次加上高光
            return snippet.replace(regex, '<span class="search-highlight">$1</span>');
        }

        function showHome() {
            const container = document.getElementById('view-container');
            const labelsMap = {};
            allIssues.forEach(item => {
                item.labels.forEach(l => {
                    if (!labelsMap[l.name]) labelsMap[l.name] = [];
                    if (labelsMap[l.name].length < 5) labelsMap[l.name].push(item.title);
                });
            });
            let html = `<div class="grid-container">`;
            for (const [name, titles] of Object.entries(labelsMap)) {
                html += `
                    <div class="grid-item" style="padding:25px" onclick="showCategory('${name}')">
                        <div style="font-family:'Noto Serif SC',serif;font-size:1.5em;color:var(--v-green);margin-bottom:12px"># ${name}</div>
                        <ul style="list-style:none;padding:0;margin:0;font-size:13px;color:#666">
                            ${titles.map(t => `<li style="margin-bottom:6px;border-bottom:1px solid #f0f0f0">${t}</li>`).join('')}
                        </ul>
                    </div>`;
            }
            container.innerHTML = html + `</div>`;
        }

        function showCategory(ln) {
            const container = document.getElementById('view-container');
            const filtered = allIssues.filter(i => i.labels.some(l => l.name === ln));
            let html = `<div class="list-view"><h2>分类：${ln}</h2>`;
            filtered.forEach(item => {
                html += `<div class="title-card" onclick="showArticle(${item.number})"><h3>${item.title}</h3><span>→</span></div>`;
            });
            container.innerHTML = html + `</div>`;
        }

        function showArticle(num, kw = null) {
            const container = document.getElementById('view-container');
            const item = allIssues.find(i => i.number === num);
            let body = item.body || '暂无内容';
            if(kw) body = body.replace(new RegExp(`(${kw})`, 'gi'), '<span class="search-highlight">$1</span>');
            
            container.innerHTML = `
                <div class="article-view">
                    <h1>${item.title}</h1>
                    <div class="article-content">${body}</div>
                </div>`;
            container.scrollTo(0, 0);
        }

        init();
    </script>
</body>
</html>
