<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>折立</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@700&display=swap" rel="stylesheet">
    <style>
        /* 1. 全局样式 */
        body, html { 
            margin: 0; padding: 0; height: 100%; 
            background-color: #f4f1ea; 
            /* 默认字体也稍微优化，更有阅读感 */
            font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", serif; 
            display: flex; overflow: hidden; 
        }
        
        /* 2. 棕色侧边栏 */
        .sidebar { 
            position: fixed; top: 0; left: 0; width: 80px; height: 100vh; 
            background-color: #7a5230; z-index: 100; 
            display: flex; flex-direction: column; align-items: center; 
            box-shadow: 2px 0 10px rgba(0,0,0,0.1); 
        }

        /* 站名：折立 - 重点优化 */
        .site-name-vertical { 
            writing-mode: vertical-rl; 
            color: #f4f1ea; 
            /* 使用引入的思源宋体 */
            font-family: 'Noto Serif SC', serif;
            font-size: 28px; 
            font-weight: 700; 
            letter-spacing: 12px; /* 拉开字间距，更有呼吸感 */
            margin: 45px 0; 
            cursor: pointer; 
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
            transition: 0.3s;
        }
        .site-name-vertical:hover { opacity: 0.8; }

        .nav-label { 
            writing-mode: vertical-rl; 
            color: rgba(244, 241, 234, 0.5); 
            font-size: 16px; 
            margin: 20px 0; 
            cursor: pointer; 
            transition: 0.3s; 
            position: relative; 
            padding: 5px 0; 
        }
        .nav-label.active { color: #fff; font-weight: bold; }
        .nav-label.active::after { 
            content: ''; position: absolute; right: -8px; top: 10%; 
            height: 80%; width: 3px; background-color: #fff; border-radius: 2px; 
        }

        /* 3. 右侧主内容区 */
        .main-content { margin-left: 80px; flex: 1; padding: 40px; overflow-y: auto; height: 100vh; box-sizing: border-box; }
        
        /* 4. 动画 */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 5. 笔记卡片样式 */
        .card { 
            background: #fff; border-radius: 8px; padding: 30px; margin-bottom: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-left: 5px solid #7a5230;
            position: relative; display: flex; flex-direction: column;
            animation: fadeInUp 0.6s ease backwards; 
        }
        .card h3 { 
            margin-top: 0; color: #7a5230; font-size: 1.5em; 
            font-family: 'Noto Serif SC', serif; /* 标题也统一用宋体，更融合 */
            border-bottom: 1px solid #f0f0f0; padding-bottom: 12px; margin-bottom: 18px; 
        }
        .card-body { color: #444; line-height: 1.8; white-space: pre-wrap; padding-bottom: 40px; font-size: 1.1em; }

        /* 6. 右下角分类标签 */
        .card-footer-tags { position: absolute; right: 20px; bottom: 15px; display: flex; gap: 8px; }
        .inner-tag { padding: 2px 10px; border-radius: 4px; font-size: 12px; color: #fff; font-weight: bold; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="site-name-vertical" onclick="filterNotes('all', this)">折立</div>
        <div id="label-list"></div>
    </div>
    <div class="main-content">
        <div id="feed">正在同步云端笔记...</div>
    </div>

    <script>
        let allIssues = [];
        const repoPath = 'skakla/mmkkl';

        fetch(`https://api.github.com/repos/${repoPath}/issues?per_page=100`)
            .then(res => res.json())
            .then(data => {
                allIssues = data;
                renderLabels(data);
                renderNotes(data);
            })
            .catch(err => {
                document.getElementById('feed').innerHTML = '<p>加载失败，请刷新页面。</p>';
            });

        function renderLabels(data) {
            const labelList = document.getElementById('label-list');
            labelList.innerHTML = '';
            let labels = new Set();
            data.forEach(item => item.labels.forEach(l => labels.add(l.name)));
            labels.forEach(name => {
                const el = document.createElement('div');
                el.className = 'nav-label';
                el.innerText = name;
                el.onclick = function() { filterNotes(name, this); };
                labelList.appendChild(el);
            });
        }

        function renderNotes(data) {
            const feed = document.getElementById('feed');
            feed.innerHTML = '';
            data.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.style.animationDelay = (index * 0.1) + 's';
                let tagsHtml = item.labels.map(l => 
                    `<span class="inner-tag" style="background:#${l.color}">${l.name}</span>`
                ).join('');
                card.innerHTML = `
                    <h3>${item.title}</h3>
                    <div class="card-body">${item.body}</div>
                    <div class="card-footer-tags">${tagsHtml || '<span class="inner-tag" style="background:#bbb">未分类</span>'}</div>
                `;
                feed.appendChild(card);
            });
        }

        function filterNotes(labelName, element) {
            document.querySelectorAll('.nav-label, .site-name-vertical').forEach(el => el.classList.remove('active'));
            if(element) element.classList.add('active');
            const filtered = labelName === 'all' ? allIssues : allIssues.filter(item => item.labels.some(l => l.name === labelName));
            renderNotes(filtered);
        }
    </script>
</body>
</html>
