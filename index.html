<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>明站</title>
    <style>
        /* 1. 全局样式 */
        body, html { margin: 0; padding: 0; height: 100%; background-color: #f4f1ea; font-family: sans-serif; display: flex; overflow: hidden; }
        
        /* 2. 棕色侧边栏 */
        .sidebar { position: fixed; top: 0; left: 0; width: 80px; height: 100vh; background-color: #7a5230; z-index: 100; display: flex; flex-direction: column; align-items: center; box-shadow: 2px 0 10px rgba(0,0,0,0.1); }
        .site-name-vertical { writing-mode: vertical-rl; color: #f4f1ea; font-size: 24px; font-weight: bold; letter-spacing: 8px; margin: 40px 0; cursor: pointer; text-decoration: none; }
        .nav-label { writing-mode: vertical-rl; color: rgba(244, 241, 234, 0.5); font-size: 16px; margin: 20px 0; cursor: pointer; transition: 0.3s; position: relative; padding: 5px 0; }
        .nav-label.active { color: #fff; font-weight: bold; }
        .nav-label.active::after { content: ''; position: absolute; right: -8px; top: 10%; height: 80%; width: 3px; background-color: #fff; border-radius: 2px; }

        /* 3. 右侧主内容区 */
        .main-content { margin-left: 80px; flex: 1; padding: 40px; overflow-y: auto; height: 100vh; box-sizing: border-box; }
        
        /* 4. 动画定义 */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 5. 笔记卡片样式 */
        .card { 
            background: #fff; border-radius: 8px; padding: 25px; margin-bottom: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-left: 5px solid #7a5230;
            position: relative; display: flex; flex-direction: column;
            animation: fadeInUp 0.6s ease backwards; 
        }
        .card h3 { margin-top: 0; color: #7a5230; font-size: 1.4em; border-bottom: 1px solid #f0f0f0; padding-bottom: 10px; margin-bottom: 15px; }
        .card-body { color: #555; line-height: 1.8; white-space: pre-wrap; padding-bottom: 35px; font-size: 1.05em; }

        /* 6. 右下角分类标签 */
        .card-footer-tags { position: absolute; right: 20px; bottom: 15px; display: flex; gap: 8px; }
        .inner-tag { padding: 2px 10px; border-radius: 4px; font-size: 12px; color: #fff; font-weight: bold; box-shadow: 1px 1px 3px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="site-name-vertical" onclick="filterNotes('all', this)">明站</div>
        <div id="label-list"></div>
    </div>
    <div class="main-content">
        <div id="feed">正在从云端加载数据...</div>
    </div>

    <script>
        let allIssues = [];
        // 确保你的仓库路径正确：skakla/mmkkl
        const repoUrl = 'https://api.github.com/repos/skakla/mmkkl/issues';

        fetch(repoUrl)
            .then(res => {
                if (!res.ok) throw new Error('网络请求失败');
                return res.json();
            })
            .then(data => {
                allIssues = data;
                renderLabels(data);
                renderNotes(data);
            })
            .catch(err => {
                document.getElementById('feed').innerHTML = '<p style="color:red">加载失败，请检查仓库权限或稍后再试</p>';
            });

        function renderLabels(data) {
            const labelList = document.getElementById('label-list');
            labelList.innerHTML = '';
            let labels = new Set();
            data.forEach(item => item.labels.forEach(l => labels.add(l.name)));
            labels.forEach(name => {
                const el = document.createElement('div');
                el.className = 'nav-label';
                el.innerText = name;
                el.onclick = function() { filterNotes(name, this); };
                labelList.appendChild(el);
            });
        }

        function renderNotes(data) {
            const feed = document.getElementById('feed');
            feed.innerHTML = data.length ? '' : '<p>暂无笔记</p>';
            data.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.style.animationDelay = (index * 0.1) + 's';

                let tagsHtml = item.labels.map(l => 
                    `<span class="inner-tag" style="background:#${l.color}">${l.name}</span>`
                ).join('');

                card.innerHTML = `
                    <h3>${item.title}</h3>
                    <div class="card-body">${item.body}</div>
                    <div class="card-footer-tags">${tagsHtml || '<span class="inner-tag" style="background:#bbb">未分类</span>'}</div>
                `;
                feed.appendChild(card);
            });
        }

        function filterNotes(labelName, element) {
            document.querySelectorAll('.nav-label, .site-name-vertical').forEach(el => el.classList.remove('active'));
            if(element) element.classList.add('active');
            if (labelName === 'all') { renderNotes(allIssues); } 
            else { renderNotes(allIssues.filter(item => item.labels.some(l => l.name === labelName))); }
        }
    </script>
</body>
</html>
