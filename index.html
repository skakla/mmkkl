<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Skakla 的空间</title>
    <style>
        body { background-color: #1a1a1a; color: #eee; font-family: sans-serif; padding: 30px; max-width: 800px; margin: 0 auto; }
        header { border-bottom: 2px solid #ff4500; padding-bottom: 10px; margin-bottom: 20px; }
        h1 { color: #ff4500; margin: 0; }
        .card { background: #2d2d2d; padding: 20px; border-radius: 5px; border-left: 5px solid #ff4500; margin-bottom: 20px; }
        .btn { background: #ff4500; color: white; padding: 10px 15px; text-decoration: none; border-radius: 3px; display: inline-block; font-weight: bold; margin-bottom: 20px; }
        h3 { color: #ff4500; margin-top: 0; }
        .issue-body { white-space: pre-wrap; color: #ccc; line-height: 1.6; }
    </style>
</head>
<body>
    <header><h1>Skakla's Digital Space</h1></header>
    <a href="https://github.com/skakla/mmkkl/issues" class="btn">＋ 发布新动态</a>
    <div id="feed"><p>正在连接云端数据库...</p></div>
    <script>
        fetch('https://api.github.com/repos/skakla/mmkkl/issues')
            .then(res => res.json())
            .then(data => {
                const feed = document.getElementById('feed');
                feed.innerHTML = ''; 
                data.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `<h3>${item.title}</h3><div class="issue-body">${item.body}</div>`;
                    feed.appendChild(card);
                });
            });
    </script>
</body>
</html>
